backend:
  name: github
  repo: Kalpa08/ssa-bhu-webzine
  branch: main

# Activates the Draft -> Review -> Publish pipeline
publish_mode: editorial_workflow
  
media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "echoes"
    label: "Echoes (Literature)"
    folder: "src/content/echoes"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Publish Date", name: "publishDate", widget: "datetime"}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "interface"
    label: "Interface (Science & Technology)"
    folder: "src/content/interface"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Publish Date", name: "publishDate", widget: "datetime"}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "canvas"
    label: "Canvas (Fine Arts)"
    folder: "src/content/canvas"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Artwork Title", name: "title", widget: "string"}
      - {label: "Artist", name: "author", widget: "string"}
      - {label: "Publish Date", name: "publishDate", widget: "datetime"}
      - {label: "Artwork File", name: "image", widget: "image"}
      - {label: "Medium", name: "medium", widget: "select", options: ["Painting", "Photography", "Digital Art", "Mixed Media"]}
      - {label: "Artist Statement / Caption", name: "body", widget: "markdown", required: false}

  - name: "journeys"
    label: "Journeys (Travel & Culture)"
    folder: "src/content/journeys"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Publish Date", name: "publishDate", widget: "datetime"}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "issues"
    label: "Issues (Curated Editions)"
    folder: "src/content/issues"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Issue Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "publishDate", widget: "datetime"}
      - {label: "Cover Image", name: "image", widget: "image"}
      - {label: "Editorial / Description", name: "body", widget: "markdown"}
