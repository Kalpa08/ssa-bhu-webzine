backend:
  name: github
  repo: Kalpa08/ssa-bhu-webzine
  branch: main

publish_mode: editorial_workflow

media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "echoes"
    label: "Echoes (Literature)"
    folder: "src/content/echoes"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Publish Date", name: "publishDate", widget: "datetime"}
      - {label: "Category", name: "category", widget: "select", options: ["Poetry", "Short Story", "Reflective Essay", "Memoir", "Letter", "Translation", "Flash Fiction"]}
      - {label: "Tags", name: "tags", widget: "list", field: {name: "tag", widget: "string"}, required: false}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Issue Tag", name: "issue", widget: "string", hint: "e.g., issue-01"}
      - {label: "Reading Order", name: "order", widget: "number", value_type: "int", default: 99, hint: "Controls reading sequence (e.g., 10, 20, 30)"}

  - name: "interface"
    label: "Interface (Science & Technology)"
    folder: "src/content/interface"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Publish Date", name: "publishDate", widget: "datetime"}
      - {label: "Category", name: "category", widget: "select", options: ["Science", "Technology", "Artificial Intelligence", "Research Stories", "Mathematics", "Philosophy of Science", "Scientific Visualization"]}
      - {label: "Tags", name: "tags", widget: "list", field: {name: "tag", widget: "string"}, required: false}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Issue Tag", name: "issue", widget: "string", hint: "e.g., issue-01"}
      - {label: "Reading Order", name: "order", widget: "number", value_type: "int", default: 99, hint: "Controls reading sequence (e.g., 10, 20, 30)"}

  - name: "canvas"
    label: "Canvas (Fine Arts)"
    folder: "src/content/canvas"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Artwork Title", name: "title", widget: "string"}
      - {label: "Artist", name: "author", widget: "string"}
      - {label: "Publish Date", name: "publishDate", widget: "datetime"}
      - {label: "Category", name: "category", widget: "select", options: ["Photography", "Painting", "Digital Art", "Illustration", "Sketch", "Mixed Media"]}
      - {label: "Location", name: "location", widget: "string", required: false}
      - {label: "Tags", name: "tags", widget: "list", field: {name: "tag", widget: "string"}, required: false}
      - {label: "Artwork File", name: "image", widget: "image"}
      - {label: "Artist Statement / Caption", name: "body", widget: "markdown", required: false}
      - {label: "Issue Tag", name: "issue", widget: "string", hint: "e.g., issue-01"}
      - {label: "Reading Order", name: "order", widget: "number", value_type: "int", default: 99, hint: "Controls reading sequence (e.g., 10, 20, 30)"}

  - name: "journeys"
    label: "Journeys (Travel & Culture)"
    folder: "src/content/journeys"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Publish Date", name: "publishDate", widget: "datetime"}
      - {label: "Category", name: "category", widget: "select", options: ["Travelogue", "Photo Essay", "Nature Writing", "Cultural Exploration", "Personal Reflection"]}
      - {label: "Location", name: "location", widget: "string", required: false}
      - {label: "Tags", name: "tags", widget: "list", field: {name: "tag", widget: "string"}, required: false}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}
      - {label: "Issue Tag", name: "issue", widget: "string", hint: "e.g., issue-01"}
      - {label: "Reading Order", name: "order", widget: "number", value_type: "int", default: 99, hint: "Controls reading sequence (e.g., 10, 20, 30)"}

  - name: "issues"
    label: "Issues (Curated Editions)"
    folder: "src/content/issues"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Issue Number", name: "issueNumber", widget: "string", hint: "e.g., 01"}
      - {label: "Theme", name: "theme", widget: "string", hint: "e.g., Beginnings"}
      - {label: "Publish Date", name: "publishDate", widget: "datetime"}
      - {label: "Cover Image", name: "image", widget: "image"}
      - {label: "Editor's Note", name: "body", widget: "markdown"}
