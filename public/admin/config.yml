backend:
  name: github
  repo: Kalpa08/ssa-bhu-webzine
  branch: main
  
media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "campus"
    label: "Campus (News)"
    folder: "src/content/campus"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Publish Date", name: "publishDate", widget: "datetime"}
      - {label: "Body", name: "body", widget: "markdown"}
      
  - name: "echoes"
    label: "Echoes (Literature)"
    folder: "src/content/echoes"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Publish Date", name: "publishDate", widget: "datetime"}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "interface"
    label: "Interface (Science/Tech)"
    folder: "src/content/interface"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Publish Date", name: "publishDate", widget: "datetime"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "dialogues"
    label: "Dialogues (Debates)"
    folder: "src/content/dialogues"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Author", name: "author", widget: "string"}
      - {label: "Publish Date", name: "publishDate", widget: "datetime"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "canvas"
    label: "Canvas (Fine Arts/Photo)"
    folder: "src/content/canvas"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Artwork Title", name: "title", widget: "string"}
      - {label: "Artist", name: "author", widget: "string"}
      - {label: "Publish Date", name: "publishDate", widget: "datetime"}
      - {label: "Artwork File", name: "image", widget: "image"}
      - {label: "Medium", name: "medium", widget: "select", options: ["Painting", "Photography", "Digital Art", "Mixed Media"]}
      - {label: "Artist Statement / Caption", name: "body", widget: "markdown", required: false}
